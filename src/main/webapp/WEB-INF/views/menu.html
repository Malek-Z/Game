<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>2048 — Menu</title>
		<link rel="stylesheet" th:href="@{/resources/css/style.css}" />
	</head>
	<body>
		<h1>2048</h1>
		<p class="subtitle">Main Menu</p>

		<!-- Player info bar -->
		<div class="player-info-bar">
			<span class="welcome" th:text="'👤 ' + ${player.username}"></span>
			<span class="best-badge">🏆 Best: <span th:text="${bestScore}"></span></span>
		</div>

		<!-- Main content card -->
		<div class="lb-wrap">
			<div class="menu-card">
				<!-- New Game -->
				<p class="lb-title">Start New Game</p>
				<form th:action="@{/start}" method="post" style="display: flex; flex-direction: column; gap: 12px">
					<select name="size" class="lvl active">
						<option value="3">3×3 — Easy (Target 1024)</option>
						<option value="4" selected>4×4 — Classic (Target 2048)</option>
						<option value="5">5×5 — Hard (Target 4096)</option>
					</select>

					<button type="submit" class="btn" style="margin-top: 4px">▶ Play Now</button>
				</form>

				<!-- Resume Games -->
				<div th:if="${!savedGames.isEmpty()}">
					<p class="lb-title" style="margin-top: 28px">Resume Game</p>
					<div
						th:each="game : ${savedGames}"
						class="lb-row"
						style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px"
					>
						<span class="nm" th:text="${game.size} + '×' + ${game.size} + ' · Score: ' + ${game.score}"></span>

						<div style="display: flex; gap: 8px">
							<a
								th:href="@{'/resume/' + ${game.id}}"
								class="btn sec"
								style="text-decoration: none; padding: 5px 14px; font-size: 0.78rem"
								>Resume</a
							>

							<form
								th:action="@{'/delete/' + ${game.id}}"
								method="post"
								style="display: inline"
								onsubmit="return openDeleteModal(event, this);"
							>
								<button
									type="submit"
									class="btn"
									style="background: #e94560; padding: 5px 14px; font-size: 0.78rem; border: none; cursor: pointer"
								>
									Delete
								</button>
							</form>
						</div>
					</div>
				</div>
			</div>

			<!-- Leaderboard link -->
			<div style="margin-top: 16px; text-align: center">
				<a th:href="@{/leaderboard}" class="btn sec" style="text-decoration: none">🏆 View Leaderboard</a>
			</div>
		</div>
		<div id="deleteModal" class="modal">
			<div class="modal-content glass">
				<h3>⚠ Delete Save?</h3>
				<p>This action cannot be undone.</p>

				<div class="modal-actions">
					<button class="btn sec" onclick="closeModal()">Cancel</button>
					<button class="btn" style="background: #e94560" onclick="confirmDelete()">Delete</button>
				</div>
			</div>
		</div>
	</body>
	<script th:src="@{/resources/js/game.js}" defer></script>
</html>
